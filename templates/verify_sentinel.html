{% extends "base.html" %}

{% block content %}
<div class="h-full flex items-center justify-center w-full mt-24">
    <div class="glass-panel p-10 rounded-3xl max-w-lg w-full text-center relative overflow-hidden border border-cyan-500/30">
        
        <!-- Animated Scan Line -->
        <div class="absolute inset-0 bg-gradient-to-b from-transparent via-cyan-500/10 to-transparent h-20 w-full animate-scan pointer-events-none"></div>

        <div class="relative z-10">
            <div class="w-20 h-20 bg-cyan-950/50 rounded-full flex items-center justify-center mx-auto mb-8 border border-cyan-500/50 shadow-[0_0_30px_rgba(6,182,212,0.3)]">
                <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>

            <h2 class="text-3xl font-black tracking-tighter uppercase mb-2 italic">Sentinel Handshake</h2>
            <p class="text-gray-400 font-mono text-[10px] uppercase tracking-[0.2em] mb-8">Hardware-Bound Identity Verification Required</p>
            
            <div id="status-box" class="bg-black/40 border border-white/5 rounded-lg p-4 mb-8 text-left">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-mono text-gray-500">ENCLAVE_STATUS</span>
                    <span id="enclave-status" class="text-[10px] font-mono text-cyan-400">WAITING...</span>
                </div>
                <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-cyan-500 transition-all duration-1000 w-0"></div>
                </div>
            </div>

            <button id="sign-btn" onclick="performHandshake()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white font-black text-xs uppercase tracking-widest rounded-lg shadow-[0_0_20px_rgba(6,182,212,0.3)] transition-all transform hover:scale-[1.02]">
                Initiate Handshake
            </button>

            <p class="mt-6 text-[10px] font-mono text-gray-500 uppercase tracking-widest">
                Verification via non-exportable hardware key
            </p>
        </div>
    </div>
</div>

<script>
    async function performHandshake() {
        const btn = document.getElementById('sign-btn');
        const status = document.getElementById('enclave-status');
        const progress = document.getElementById('progress-bar');
        
        btn.disabled = true;
        btn.classList.add('opacity-50');
        status.innerText = "POLLING...";
        progress.style.width = "40%";

        try {
            // 1. Get Challenge from Server
            const res = await fetch('/auth/verify-sentinel-challenge');
            const { nonce } = await res.json();
            
            status.innerText = "SIGNING...";
            progress.style.width = "70%";

            // 2. Sign using Sentinel JS module
            const signature = await Sentinel.signChallenge(nonce);
            
            if(!signature) throw new Error("Hardware signature refused.");

            status.innerText = "VERIFYING...";
            progress.style.width = "90%";

            // 3. Submit to Server
            const verifyRes = await fetch('/auth/verify-sentinel', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ signature })
            });

            const result = await verifyRes.json();
            if(result.status === 'ok') {
                status.innerText = "COMPLETE";
                progress.style.width = "100%";
                logToTerminal("[SENTINEL] Handshake Validated. Accessing Core...");
                setTimeout(() => window.location.href = "{{ url_for('profile.dashboard') }}", 1000);
            } else {
                throw new Error(result.message);
            }
        } catch (e) {
            status.innerText = "ERROR";
            status.classList.replace('text-cyan-400', 'text-rose-500');
            progress.classList.replace('bg-cyan-500', 'bg-rose-500');
            btn.disabled = false;
            btn.classList.remove('opacity-50');
            logToTerminal(`[SENTINEL] CRITICAL: ${e.message}`);
        }
    }
</script>
{% endblock %}
