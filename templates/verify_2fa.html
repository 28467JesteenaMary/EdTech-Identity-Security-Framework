{% extends "base.html" %}

{% block content %}
<div class="h-full flex items-center justify-center w-full mt-24">
    <div class="glass-panel p-10 rounded-3xl max-w-xl w-full relative overflow-hidden border border-indigo-500/30">
        
        <div class="relative z-10 text-center">
            <h2 class="text-3xl font-black tracking-tighter uppercase italic mb-2">Matrix Challenge</h2>
            <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-10">Enter the 6-digit sync code from your mobile node.</p>
            
            <form action="{{ url_for('auth.verify_2fa') }}" method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="group">
                    <input type="text" name="totp_code" pattern="[0-9]{6}" placeholder="000000" autocomplete="off" class="w-full bg-black/20 border border-white/10 rounded-lg p-5 text-center text-4xl font-mono tracking-[0.5em] text-white focus:outline-none focus:border-indigo-500 transition-all placeholder-white/5">
                </div>
                
                <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-black text-xs uppercase tracking-widest rounded-lg shadow-[0_0_20px_rgba(99,102,241,0.3)] transition-all">
                    Authorize Node Access
                </button>
            </form>

            <div class="mt-12 relative">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
                <div class="relative flex justify-center"><span class="px-4 bg-black/40 text-[8px] font-mono text-gray-600 uppercase tracking-[0.3em]">Emergency Protocols</span></div>
            </div>

            <div class="mt-8 grid grid-cols-1 gap-4">
                <a href="{{ url_for('auth.recover_account') }}" class="text-[10px] font-mono text-purple-400 hover:text-purple-300 uppercase tracking-widest transition-colors flex items-center justify-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Initiate Shamir Social Recovery
                </a>
                
                <button onclick="document.getElementById('backup-form').classList.toggle('hidden')" class="text-[10px] font-mono text-gray-500 hover:text-gray-400 uppercase tracking-widest transition-colors">
                    Use One-Time Backup Hash
                </button>
            </div>

            <form id="backup-form" action="{{ url_for('auth.verify_2fa') }}" method="POST" class="mt-6 hidden space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="text" name="backup_code" placeholder="ENTER_8_DIGIT_HASH" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 text-center text-xs font-mono text-gray-400 focus:outline-none focus:border-indigo-500">
                <button type="submit" class="w-full py-2 bg-white/5 text-gray-400 font-bold text-[10px] uppercase rounded-lg border border-white/10 hover:bg-white/10">Bypass Verification</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
