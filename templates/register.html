{% extends "base.html" %}

{% block content %}
<div class="h-full flex items-center justify-center w-full mt-24">
    <div class="glass-panel p-1 border-white/10 rounded-3xl max-w-5xl w-full relative overflow-hidden">
        <div class="flex flex-col lg:flex-row rounded-[22px] overflow-hidden">
            
            <!-- Branding Panel -->
            <div class="hidden lg:flex lg:w-4/12 bg-black/40 p-12 flex-col justify-between relative border-r border-white/5">
                <div class="relative z-10">
                    <h1 class="text-3xl font-black italic tracking-tighter uppercase mb-6 text-gradient">Node Genesis</h1>
                    <p class="text-[10px] font-mono text-gray-500 leading-relaxed uppercase tracking-widest">Aether-Chasm Protocol // Layer 1: Registration</p>
                </div>
                
                <div class="relative z-10">
                    <div class="p-4 bg-indigo-500/5 rounded-xl border border-indigo-500/20">
                        <p class="text-[10px] font-mono text-indigo-400 uppercase tracking-widest">Status: Ready for Identity Mapping</p>
                    </div>
                </div>
            </div>

            <!-- Registration Form -->
            <div class="w-full lg:w-8/12 p-10 lg:p-16 bg-black/60 backdrop-blur-3xl">
                <div class="mb-10">
                    <h2 class="text-2xl font-black uppercase italic tracking-tight mb-2">Create Identity</h2>
                    <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Initialize your secure vector in the mesh.</p>
                </div>

                <form class="space-y-8" action="{{ url_for('auth.register') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <!-- Role Selection Matrix -->
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer group relative">
                            <input type="radio" name="role" value="student" class="peer hidden" checked onchange="document.getElementById('id-label').innerText='Campus_ID';">
                            <div class="p-4 bg-white/5 border border-white/10 rounded-xl text-center peer-checked:border-indigo-500 peer-checked:bg-indigo-500/10 transition-all">
                                <p class="text-[10px] font-mono font-bold text-gray-500 peer-checked:text-indigo-400 uppercase tracking-widest group-hover:text-gray-300">Student Access</p>
                            </div>
                        </label>
                        <label class="cursor-pointer group relative">
                            <input type="radio" name="role" value="teacher" class="peer hidden" onchange="document.getElementById('id-label').innerText='Instructor_Email';">
                            <div class="p-4 bg-white/5 border border-white/10 rounded-xl text-center peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition-all">
                                <p class="text-[10px] font-mono font-bold text-gray-500 peer-checked:text-purple-400 uppercase tracking-widest group-hover:text-gray-300">Faculty Access</p>
                            </div>
                        </label>
                    </div>

                    <div class="space-y-6">
                        <div class="group">
                            <label id="id-label" class="block text-[10px] font-mono text-gray-600 uppercase tracking-widest mb-2">Campus_ID</label>
                            <input name="identifier" type="text" required class="w-full bg-black/20 border border-white/10 rounded-lg p-4 text-xs font-mono text-white focus:outline-none focus:border-indigo-500 transition-all" placeholder="Required for Whitelist Verification">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="group">
                                <label class="block text-[10px] font-mono text-gray-600 uppercase tracking-widest mb-2 group-focus-within:text-indigo-400 transition-colors">Credential_ID</label>
                                <input name="email" type="email" required class="w-full bg-black/20 border border-white/10 rounded-lg p-4 text-xs font-mono text-white focus:outline-none focus:border-indigo-500 transition-all" placeholder="your@yenepoya.edu">
                            </div>
                            <div class="group">
                                <label class="block text-[10px] font-mono text-gray-600 uppercase tracking-widest mb-2 group-focus-within:text-indigo-400 transition-colors">Access_Cipher</label>
                                <input name="password" type="password" required class="w-full bg-black/20 border border-white/10 rounded-lg p-4 text-xs font-mono text-white focus:outline-none focus:border-indigo-500 transition-all" placeholder="••••••••">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full py-4 bg-white text-black font-black text-xs uppercase tracking-widest rounded-lg shadow-2xl hover:bg-gray-200 transition-all transform hover:scale-[1.01]">
                        Generate Identity
                    </button>
                </form>

                <div class="mt-10 relative">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
                    <div class="relative flex justify-center"><span class="px-4 bg-black/60 text-[8px] font-mono text-gray-600 uppercase tracking-[0.3em]">Alternate Vector</span></div>
                </div>

                <div class="mt-6">
                    <a href="{{ url_for('auth.google_login') }}" class="w-full flex items-center justify-center py-3 border border-white/10 rounded-lg hover:bg-white/5 transition-all">
                        <span class="text-[10px] font-mono text-gray-300 uppercase tracking-widest">Register with Google Proxy</span>
                    </a>
                </div>

                <p class="mt-10 text-center text-[10px] font-mono text-gray-600 uppercase tracking-widest">
                    Existing Node? <a href="{{ url_for('auth.login') }}" class="text-indigo-400 hover:text-indigo-300 underline underline-offset-4">Authenticate</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
