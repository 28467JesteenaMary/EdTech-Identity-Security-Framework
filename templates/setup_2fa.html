{% extends "base.html" %}

{% block content %}
<div class="h-full flex items-center justify-center w-full mt-24">
    <div class="glass-panel p-10 rounded-3xl max-w-xl w-full relative overflow-hidden border border-indigo-500/30">
        
        <div class="relative z-10 text-center">
            <h2 class="text-3xl font-black tracking-tighter uppercase italic mb-2">Sync Authenticator</h2>
            <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-10">Scan the QR code below to bind your mobile node.</p>
            
            <div class="flex justify-center mb-8">
                <div class="p-4 bg-white rounded-2xl shadow-[0_0_40px_rgba(99,102,241,0.2)] border border-indigo-500/20">
                    <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR Code" class="w-48 h-48 mix-blend-multiply">
                </div>
            </div>

            <div class="bg-black/40 border border-white/5 rounded-xl p-4 mb-8">
                <p class="text-[8px] font-mono text-gray-600 uppercase tracking-widest mb-2">Manual Intervention Key</p>
                <div class="text-lg font-mono font-black tracking-[0.4em] text-indigo-400">{{ secret }}</div>
            </div>

            <form action="{{ url_for('auth.setup_2fa') }}" method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="group">
                    <label class="block text-[10px] font-mono text-gray-600 uppercase tracking-widest mb-4 group-focus-within:text-indigo-400 transition-colors">Enter 6-Digit Sync Code</label>
                    <input type="text" name="totp_code" required pattern="[0-9]{6}" autocomplete="off" class="w-full bg-black/20 border border-white/10 rounded-lg p-5 text-center text-3xl font-mono tracking-[0.5em] text-white focus:outline-none focus:border-indigo-500 transition-all" placeholder="000000">
                </div>
                
                <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-black text-xs uppercase tracking-widest rounded-lg shadow-[0_0_20px_rgba(99,102,241,0.3)] transition-all">
                    Verify & Engage Armor
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
